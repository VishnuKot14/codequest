services:
  - type: web
    name: codequest-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # You paste this value manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CLIENT_URL
        sync: false        # You paste your Vercel URL here after deploying the frontend
